<!DOCTYPE html>
<html lang="en">
<head>
    <title>Embedded Form</title>
</head>
<body>
    <form>
        <label>Name</label>
        <input type="text" name="name"/>

        <br/>

        <label>Email</label>
        <input type="text" name="mail"/>

        <br/>

        <p>Subject :</p>
        <textarea cols="10" rows="5" ></textarea>

        <br/>

        <p>Message :</p>
        <textarea cols="20" rows="10"></textarea>
    </form>
</body>
</html>
